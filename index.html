}

/* ---------------- MAYIN TARLASI ---------------- */

const MINESWEEPER_DIFFICULTIES = [
  { id: "kolay", label: "Kolay", rows: 8, cols: 8, mines: 10 },
  { id: "orta", label: "Orta", rows: 10, cols: 10, mines: 16 },
  { id: "zor", label: "Zor", rows: 12, cols: 12, mines: 24 },
];

function makeEmptyMSGrid(rows, cols) {
  return Array.from({ length: rows }, () =>
    Array.from({ length: cols }, () => ({ mine: false, revealed: false, flagged: false, adj: 0 }))
  );
}

function placeMines(grid, rows, cols, mineCount, safeR, safeC) {
  const forbidden = new Set();
  for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
    const r = safeR + dr, c = safeC + dc;
    if (r >= 0 && r < rows && c >= 0 && c < cols) forbidden.add(r * cols + c);
  }
  let placed = 0;
  let guard = 0;
  while (placed < mineCount && guard < 5000) {
    guard++;
    const idx = Math.floor(Math.random() * rows * cols);
    if (forbidden.has(idx)) continue;
    const r = Math.floor(idx / cols), c = idx % cols;
    if (grid[r][c].mine) continue;
    grid[r][c].mine = true;
    placed++;
  }
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (grid[r][c].mine) continue;
    let count = 0;
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc].mine) count++;
    }
    grid[r][c].adj = count;
  }
  return grid;
}

function floodRevealMS(grid, rows, cols, startR, startC) {
  const stack = [[startR, startC]];
  while (stack.length) {
    const [cr, cc] = stack.pop();
    const cell = grid[cr][cc];
    if (cell.revealed || cell.flagged) continue;
    cell.revealed = true;
    if (cell.adj === 0 && !cell.mine) {
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = cr + dr, nc = cc + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !grid[nr][nc].revealed) stack.push([nr, nc]);
      }
    }
  }
}

function checkMSWin(grid, rows, cols) {
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (!grid[r][c].mine && !grid[r][c].revealed) return false;
  }
  return true;
}

function msNumberColor(n) {
  const colors = { 1: "#5E8FC9", 2: "#7FA88C", 3: "#C9705E", 4: "#9B8ED9", 5: "#C9A65E", 6: "#5BC2C9", 7: PALETTE.bright, 8: PALETTE.dim };
  return colors[n] || PALETTE.bright;
}

function minesweeperMessage(history) {
  if (history.length === 0) return "Henüz hiç oynamadın. İlk turunda kaç mayına basmadan ızgarayı temizleyebileceğini görelim.";
  const wins = history.filter((h) => h.outcome === "won");
  const winRate = (wins.length / history.length) * 100;
  if (wins.length === 0) return `Henüz kazanılmış bir turun yok (${history.length} deneme). Mayın Tarlası'nda ilk kazanç genelde en zor eşiktir — sayılara güvenerek ilerlemeye devam et.`;
  const bestWinMs = Math.min(...wins.map((h) => h.timeMs));
  if (winRate >= 70) return `Kazanma oranın %${winRate.toFixed(0)} — gayet güvenli oynuyorsun. En hızlı kazancın ${formatClock(bestWinMs)}.`;
  if (winRate >= 40) return `Kazanma oranın %${winRate.toFixed(0)}. Sayılara göre bayrak koyma stratejin gelişiyor.`;
  return `Kazanma oranın %${winRate.toFixed(0)} — bu oyun sabır ister, mayına basmadan önce çevredeki sayıları dikkatlice okumaya devam et.`;
}

function MinesweeperGame({ onBack, onReport, history, setHistory }) {
  const [phase, setPhase] = useState("idle"); // idle | playing | ad | result
  const [difficultyIndex, setDifficultyIndex] = useState(0);
  const [grid, setGrid] = useState(null);
  const [started, setStarted] = useState(false);
  const [flagMode, setFlagMode] = useState(false);
  const [elapsedMs, setElapsedMs] = useState(0);
  const [outcome, setOutcome] = useState(null);
  const startTimeRef = useRef(0);
  const timerRef = useRef(null);

  const ACCENT = GAME_THEMES.minesweeper.accent;
  const ACCENT_SOFT = GAME_THEMES.minesweeper.soft;
  const diff = MINESWEEPER_DIFFICULTIES[difficultyIndex];

  useEffect(() => () => { if (timerRef.current) clearInterval(timerRef.current); }, []);

  function startGame() {
    setGrid(makeEmptyMSGrid(diff.rows, diff.cols));
    setStarted(false);
    setFlagMode(false);
    setElapsedMs(0);
    setOutcome(null);
    setPhase("playing");
  }

  function startTimer() {
    startTimeRef.current = Date.now();
    timerRef.current = setInterval(() => setElapsedMs(Date.now() - startTimeRef.current), 500);
  }

  function endGame(g, result) {
    if (timerRef.current) clearInterval(timerRef.current);
    const timeMs = Date.now() - startTimeRef.current;
    const entry = { difficulty: diff.label, timeMs, outcome: result, id: Date.now() };
    setHistory((prev) => [entry, ...prev].slice(0, 30));
    setOutcome(result);
    setGrid(g);
    trackEvent("game_round_complete", { game: "minesweeper", difficulty: diff.label, outcome: result, timeMs });
    setPhase("result");
  }

  function revealAllMines(g) {
    for (let r = 0; r < diff.rows; r++) for (let c = 0; c < diff.cols; c++) {
      if (g[r][c].mine) g[r][c].revealed = true;
    }
  }

  function handleCellPress(r, c) {
    if (phase !== "playing" || !grid) return;
    const cell = grid[r][c];

    if (flagMode) {
      if (cell.revealed) return;
      const g = grid.map((row) => row.map((cl) => ({ ...cl })));
      g[r][c].flagged = !g[r][c].flagged;
      setGrid(g);
      return;
    }

    if (cell.revealed || cell.flagged) return;

    let g = grid.map((row) => row.map((cl) => ({ ...cl })));
    if (!started) {
      placeMines(g, diff.rows, diff.cols, diff.mines, r, c);
      setStarted(true);
      startTimer();
    }

    if (g[r][c].mine) {
      revealAllMines(g);
      endGame(g, "lost");
      return;
    }

    floodRevealMS(g, diff.rows, diff.cols, r, c);
    setGrid(g);
    if (checkMSWin(g, diff.rows, diff.cols)) {
      endGame(g, "won");
    }
  }

  function playAgain() { setPhase("ad"); }
  function finishAd() { startGame(); }

  const flaggedCount = grid ? grid.flat().filter((c) => c.flagged).length : 0;
  const minesLeft = diff.mines - flaggedCount;
  const wins = history.filter((h) => h.outcome === "won");
  const bestWinTime = wins.length ? Math.min(...wins.map((h) => h.timeMs)) : null;

  return (
    <Shell>
      <TopBar title="Mayın Tarlası" onBack={onBack} onReport={onReport} accent={ACCENT} />

      {phase === "idle" && (
        <>
          <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
            {MINESWEEPER_DIFFICULTIES.map((d, i) => (
              <button key={d.id} type="button" onClick={() => setDifficultyIndex(i)}
                style={{
                  padding: "8px 16px", borderRadius: 999,
                  border: `1px solid ${difficultyIndex === i ? ACCENT : PALETTE.border}`,
                  background: difficultyIndex === i ? ACCENT_SOFT : "transparent",
                  color: difficultyIndex === i ? PALETTE.bright : "#8B93A7",
                  fontSize: 13, cursor: "pointer",
                }}>{d.label}</button>
            ))}
          </div>
          <p style={{ color: PALETTE.dim, fontSize: 13, textAlign: "center", maxWidth: 300, marginBottom: 24, lineHeight: 1.6 }}>
            Izgarada gizli mayınlar var. Bir hücreye dokun — açılan hücredeki sayı, çevresindeki kaç hücrede mayın olduğunu gösterir. İlk dokunuşun asla mayına denk gelmez. Mayın olmadığından eminsen "Bayrak" moduna geçip işaretle. Tüm güvenli hücreleri açınca kazanırsın.
          </p>
          <button type="button" onClick={startGame}
            style={{ width: 180, height: 180, borderRadius: "50%", border: `1px solid ${PALETTE.border}`, cursor: "pointer", background: `radial-gradient(circle, ${hexToRgba(ACCENT, 0.16)} 0%, #12161F 75%)`, color: PALETTE.bright, fontSize: 16, fontWeight: 500 }}>Başla</button>
          {bestWinTime !== null && (
            <p style={{ color: PALETTE.faint, fontSize: 12, marginTop: 20 }}>En hızlı kazanç: {formatClock(bestWinTime)}</p>
          )}
        </>
      )}

      {phase === "ad" && <AdScreen onDone={finishAd} />}

      {phase === "playing" && grid && (
        <>
          <div style={{ display: "flex", gap: 20, fontSize: 12, color: PALETTE.dim, marginBottom: 14, alignItems: "center" }}>
            <span>Mayın: <span className="mono" style={{ color: ACCENT, fontWeight: 600 }}>{minesLeft}</span></span>
            <span>Süre: <span className="mono" style={{ color: PALETTE.dim, fontWeight: 600 }}>{formatClock(elapsedMs)}</span></span>
          </div>

          <button type="button" onClick={() => setFlagMode((f) => !f)}
            style={{
              marginBottom: 14, padding: "8px 18px", borderRadius: 999,
              border: `1px solid ${flagMode ? ACCENT : PALETTE.border}`,
              background: flagMode ? ACCENT_SOFT : "transparent",
              color: flagMode ? PALETTE.bright : PALETTE.dim, fontSize: 13, cursor: "pointer",
            }}>
            🚩 Bayrak modu: {flagMode ? "Açık" : "Kapalı"}
          </button>

          <div style={{
            display: "grid", gridTemplateColumns: `repeat(${diff.cols}, 1fr)`,
            width: "100%", maxWidth: 320, aspectRatio: `${diff.cols} / ${diff.rows}`,
            border: `2px solid ${PALETTE.border}`, borderRadius: 8, overflow: "hidden", marginBottom: 16,
          }}>
            {grid.flat().map((cell, i) => {
              const r = Math.floor(i / diff.cols), c = i % diff.cols;
              return (
                <button key={i} type="button" onClick={() => handleCellPress(r, c)}
                  style={{
                    display: "flex", alignItems: "center", justifyContent: "center",
                    background: cell.revealed ? (cell.mine ? "rgba(201,112,94,0.3)" : "rgba(255,255,255,0.02)") : "rgba(255,255,255,0.05)",
                    border: "1px solid rgba(255,255,255,0.04)",
                    color: cell.revealed ? msNumberColor(cell.adj) : PALETTE.dim,
                    fontWeight: 700, fontSize: diff.cols >= 12 ? 10 : diff.cols >= 10 ? 12 : 14,
                    cursor: "pointer", padding: 0,
                  }}>
                  {cell.revealed ? (cell.mine ? "💣" : (cell.adj > 0 ? cell.adj : "")) : (cell.flagged ? "🚩" : "")}
                </button>
              );
            })}
          </div>
        </>
      )}

      {phase === "result" && (
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>{outcome === "won" ? "🎉" : "💥"}</div>
          <div className="mono" style={{ fontSize: 24, fontWeight: 700, color: PALETTE.bright, marginBottom: 4 }}>{formatClock(elapsedMs)}</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: outcome === "won" ? PALETTE.good : PALETTE.bad, marginBottom: 24 }}>
            {outcome === "won" ? "Kazandın!" : "Mayına bastın"}
          </div>
          <button type="button" onClick={playAgain}
            style={{ padding: "12px 26px", borderRadius: 999, border: `1px solid ${PALETTE.border}`, background: ACCENT_SOFT, color: PALETTE.bright, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
            Tekrar
          </button>
        </div>
      )}
    </Shell>
  );
}

/* ---------------- RAPOR ---------------- */

function innerclockMessage(history) {
  if (history.length === 0) return "Henüz hiç tur oynamadın. İlk turunla başla, sana burada ne kadar keskin olduğunu göstereceğiz.";
  const avg = history.reduce((s, h) => s + h.pct, 0) / history.length;
  const best = Math.max(...history.map((h) => h.pct));
  if (avg >= 95) return `Zaman senin içinde akıyor gibi. Ortalama %${avg.toFixed(0)} doğrulukla neredeyse kusursuz bir ritmin var — bu seviyeye gelen çok az kişi var.`;
  if (avg >= 85) return `Çok iyi bir iç saatin var. Ortalama %${avg.toFixed(0)} doğruluk, ustalığa oldukça yakınsın. En iyi turun %${best.toFixed(0)} — o hissi yakalayan sensin, tekrar yakalayabilirsin.`;
  if (avg >= 70) return `Fena değil — ortalama %${avg.toFixed(0)}. Zaman algısı pratikle keskinleşen bir kas gibi, her tur seni biraz daha geliştiriyor.`;
  return `Henüz ısınma turlarındasın (%${avg.toFixed(0)} ortalama), ve bu tamamen normal. Birkaç tur daha dene, iç saatin kendini bulacak.`;
}

function reactionMessage(history) {
  if (history.length === 0) return "Henüz hiç tur oynamadın. İlk dokunuşunla refleks hızını ölçmeye başla.";
  const avg = history.reduce((s, h) => s + h.ms, 0) / history.length;
  const best = Math.min(...history.map((h) => h.ms));
  if (avg <= 200) return `Refleksin gerçekten üst düzey — ortalama ${formatMs(Math.round(avg))}ms. Bu, birçok profesyonel oyuncunun tepki süresine yakın.`;
  if (avg <= 260) return `Ortalama insanın oldukça üzerinde bir reflekse sahipsin — ${formatMs(Math.round(avg))}ms ortalama, en iyi turun ${formatMs(best)}ms. Sağlam bir performans.`;
  if (avg <= 340) return `Sağlam bir refleks hızın var, ortalama ${formatMs(Math.round(avg))}ms. Daha fazla tekrarla bu süre kısalabilir.`;
  return `Ortalama ${formatMs(Math.round(avg))}ms — refleks kasların ısınıyor. Kısa aralıklarla birkaç tur daha denersen fark hemen görünür.`;
}

function memoryMessage(history) {
  if (history.length === 0) return "Henüz hiç tur oynamadın. İlk denemende kaç basamağa kadar hatırlayabildiğini görelim.";
  const best = Math.max(...history.map((h) => h.score));
  const avg = history.reduce((s, h) => s + h.score, 0) / history.length;
  if (best >= 9) return `${best} basamağa kadar çıkmışsın — bu, ortalama insan hafıza kapasitesinin oldukça üzerinde. Etkileyici bir çalışma belleği.`;
  if (best >= 7) return `En iyi turun ${best} basamak. Yetişkinlerin çoğu 7 civarında takılır, sen bu sınırın yakınında ya da üzerindesin.`;
  if (best >= 5) return `En iyi turun ${best} basamak, ortalaman ${avg.toFixed(1)}. Sağlam bir başlangıç, tekrar ettikçe bu sayı büyür.`;
  return `Henüz ısınıyorsun (${best} basamak). Çalışma belleği pratikle gelişen bir yetenek — birkaç tur daha dene.`;
}

function countMessage(history) {
  if (history.length === 0) return "Henüz hiç tur oynamadın. Noktalar bir anlığına görünecek, göz kararı yeteneğini test edelim.";
  const avg = history.reduce((s, h) => s + h.pct, 0) / history.length;
  const best = Math.max(...history.map((h) => h.pct));
  if (avg >= 90) return `Göz kararın gerçekten keskin — ortalama %${avg.toFixed(0)} doğruluk. Bu seviye, hızlı görsel tahmin konusunda üst düzey bir yetenek gösteriyor.`;
  if (avg >= 75) return `İyi bir göz kararın var, ortalama %${avg.toFixed(0)}. En iyi turun %${best.toFixed(0)} — o anki odağını yakaladığında fark ediliyor.`;
  if (avg >= 55) return `Ortalama %${avg.toFixed(0)} doğrulukla fena değil. Gözün kalabalık sahneleri hızlı taramaya alışıyor.`;
  return `Henüz %${avg.toFixed(0)} ortalamadasın, bu normal — göz kararı da tıpkı diğerleri gibi pratikle keskinleşiyor.`;
}

function stroopMessage(history) {
  if (history.length === 0) return "Henüz hiç oynamadın. Zihninin kelimeye mi renge mi öncelik verdiğini birlikte görelim.";
  const avgAcc = history.reduce((s, h) => s + h.accuracyPct, 0) / history.length;
  const avgMs = history.reduce((s, h) => s + h.avgMs, 0) / history.length;
  const bestAcc = Math.max(...history.map((h) => h.accuracyPct));
  if (avgAcc >= 90 && avgMs <= 900) return `Hem hızlı hem isabetli — ortalama %${avgAcc.toFixed(0)} doğruluk, ${formatMs(Math.round(avgMs))}ms tepki. Zihnin çelişkili bilgiyi görmezden gelmekte çok başarılı.`;
  if (avgAcc >= 80) return `Ortalama %${avgAcc.toFixed(0)} doğruluk gayet iyi. En iyi turun %${bestAcc.toFixed(0)} — kelimenin çekimine kapılmadan rengi görebiliyorsun.`;
  if (avgAcc >= 60) return `Ortalama %${avgAcc.toFixed(0)} doğrulukla makul bir performans. Kelime ile renk çakıştığında zihnin biraz yavaşlıyor, bu aslında herkeste olan bir şey.`;
  return `Ortalama %${avgAcc.toFixed(0)} — kelimenin anlamı rengi geçici olarak bastırıyor. Bu test genelde ilk denemelerde zorlayıcıdır, tekrar ettikçe kolaylaşır.`;
}

function sudokuMessage(history) {
  if (history.length === 0) return "Henüz hiç bulmaca çözmedin. İlk Sudoku'nu tamamla, burada nasıl gittiğini görelim.";
  const avgMs = history.reduce((s, h) => s + h.timeMs, 0) / history.length;
  const avgMistakes = history.reduce((s, h) => s + h.mistakes, 0) / history.length;
  const best = Math.min(...history.map((h) => h.timeMs));
  if (avgMs <= 180000 && avgMistakes <= 1) return `Hem hızlı hem temiz çözüyorsun — ortalama ${formatClock(avgMs)}, ortalama ${avgMistakes.toFixed(1)} hata. Sağlam bir mantık yürütme hızın var.`;
  if (avgMs <= 300000) return `Ortalama ${formatClock(avgMs)} sürede tamamlıyorsun, en iyi çözümün ${formatClock(best)}. İyi bir tempo.`;
  return `Ortalama ${formatClock(avgMs)} sürüyor çözmen, bu tamamen normal — Sudoku sabır işi, hızın zamanla artacak.`;
}

function Report({ type, history, onBack }) {
  const titles = {
    innerclock: "İç Saat Raporu",
    reaction: "Reaksiyon Raporu",
    memory: "Sayı Hafızası Raporu",
    count: "Hızlı Sayım Raporu",
    stroop: "Renk Tuzağı Raporu",
    sudoku: "Sudoku Raporu",
    "2048": "2048 Raporu",
    minesweeper: "Mayın Tarlası Raporu",
  };
  const title = titles[type];
  const messageFns = {
    innerclock: innerclockMessage,
    reaction: reactionMessage,
    memory: memoryMessage,
    count: countMessage,
    stroop: stroopMessage,
    sudoku: sudokuMessage,
    "2048": game2048Message,
    minesweeper: minesweeperMessage,
  };
  const message = messageFns[type](history);
  const count = history.length;

  let best = null, avg = null;
  if (count > 0) {
    if (type === "innerclock") {
      best = Math.max(...history.map((h) => h.pct)).toFixed(0) + "%";
      avg = (history.reduce((s, h) => s + h.pct, 0) / count).toFixed(1) + "%";
    } else if (type === "reaction") {
      best = formatMs(Math.min(...history.map((h) => h.ms))) + "ms";
      avg = formatMs(Math.round(history.reduce((s, h) => s + h.ms, 0) / count)) + "ms";
    } else if (type === "memory") {
      best = Math.max(...history.map((h) => h.score));
      avg = (history.reduce((s, h) => s + h.score, 0) / count).toFixed(1);
    } else if (type === "count") {
      best = Math.max(...history.map((h) => h.pct)).toFixed(0) + "%";
      avg = (history.reduce((s, h) => s + h.pct, 0) / count).toFixed(0) + "%";
    } else if (type === "stroop") {
      best = Math.max(...history.map((h) => h.accuracyPct)).toFixed(0) + "%";
      avg = (history.reduce((s, h) => s + h.accuracyPct, 0) / count).toFixed(0) + "%";
    } else if (type === "sudoku") {
      best = formatClock(Math.min(...history.map((h) => h.timeMs)));
      avg = formatClock(history.reduce((s, h) => s + h.timeMs, 0) / count);
    } else if (type === "2048") {
      best = Math.max(...history.map((h) => h.score)).toLocaleString("tr-TR");
      avg = Math.round(history.reduce((s, h) => s + h.score, 0) / count).toLocaleString("tr-TR");
    } else if (type === "minesweeper") {
      const wins = history.filter((h) => h.outcome === "won");
      best = wins.length ? formatClock(Math.min(...wins.map((h) => h.timeMs))) : "—";
      avg = `%${((wins.length / count) * 100).toFixed(0)}`;
    }
  }

  const ACCENT = GAME_THEMES[type] ? GAME_THEMES[type].accent : PALETTE.amber;

  return (
    <Shell>
      <div style={{ width: "100%", maxWidth: 340, display: "flex", alignItems: "center", marginBottom: 24 }}>
        <button type="button" onClick={onBack} style={{ background: "none", border: "none", color: PALETTE.dim, fontSize: 14, padding: "6px 4px", cursor: "pointer" }}>‹ Geri</button>
      </div>

      <div style={{ fontSize: 12, letterSpacing: "0.15em", textTransform: "uppercase", color: PALETTE.dim, marginBottom: 8 }}>{title}</div>

      <div style={{ display: "flex", gap: 28, margin: "16px 0 28px" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 26, fontWeight: 700, color: PALETTE.bright }}>{count}</div>
          <div style={{ fontSize: 11, color: PALETTE.dim, textTransform: "uppercase", letterSpacing: "0.08em" }}>Tur</div>
        </div>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 26, fontWeight: 700, color: ACCENT }}>{best !== null ? best : "—"}</div>
          <div style={{ fontSize: 11, color: PALETTE.dim, textTransform: "uppercase", letterSpacing: "0.08em" }}>En iyi</div>
        </div>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 26, fontWeight: 700, color: PALETTE.good }}>{avg !== null ? avg : "—"}</div>
          <div style={{ fontSize: 11, color: PALETTE.dim, textTransform: "uppercase", letterSpacing: "0.08em" }}>Ortalama</div>
        </div>
      </div>

      <div style={{
        width: "100%", maxWidth: 320, borderRadius: 16, border: `1px solid ${PALETTE.border}`,
        background: hexToRgba(ACCENT, 0.05), padding: "20px 20px", marginBottom: 28,
      }}>
        <p style={{ color: PALETTE.bright, fontSize: 14, lineHeight: 1.7, margin: 0 }}>{message}</p>
      </div>

      {count > 0 && (
        <div style={{ width: "100%", maxWidth: 320 }}>
          <div style={{ fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: PALETTE.faint, marginBottom: 10 }}>Son turlar</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {history.slice(0, 8).map((h) => (
              <div key={h.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: PALETTE.dim, padding: "6px 10px", borderRadius: 8, background: "rgba(255,255,255,0.02)" }}>
                {type === "innerclock" && (
                  <>
                    <span>{h.mode}</span>
                    <span className="mono">{(h.guessMs / 1000).toFixed(2)}sn</span>
                    <span style={{ color: accuracyLabel(h.pct).color }}>{h.pct.toFixed(0)}%</span>
                  </>
                )}
                {type === "reaction" && (
                  <>
                    <span className="mono">{formatMs(h.ms)}ms</span>
                    <span style={{ color: reactionLabel(h.ms).color }}>{reactionLabel(h.ms).text}</span>
                  </>
                )}
                {type === "memory" && (
                  <>
                    <span>Tur</span>
                    <span className="mono">{h.score} basamak</span>
                  </>
                )}
                {type === "count" && (
                  <>
                    <span>{h.guess} / gerçek {h.actual}</span>
                    <span style={{ color: accuracyLabel(h.pct).color }}>{h.pct.toFixed(0)}%</span>
                  </>
                )}
                {type === "stroop" && (
                  <>
                    <span className="mono">{formatMs(h.avgMs)}ms ort.</span>
                    <span style={{ color: accuracyLabel(h.accuracyPct).color }}>{h.accuracyPct.toFixed(0)}%</span>
                  </>
                )}
                {type === "sudoku" && (
                  <>
                    <span>{h.difficulty}</span>
                    <span className="mono">{formatClock(h.timeMs)}</span>
                    <span style={{ color: h.mistakes === 0 ? PALETTE.good : PALETTE.amber }}>{h.mistakes} hata</span>
                  </>
                )}
                {type === "2048" && (
                  <>
                    <span className="mono">{h.score.toLocaleString("tr-TR")}</span>
                    <span style={{ color: GAME_THEMES["2048"].accent }}>en yüksek {h.maxTile}</span>
                  </>
                )}
                {type === "minesweeper" && (
                  <>
                    <span>{h.difficulty}</span>
                    <span className="mono">{formatClock(h.timeMs)}</span>
                    <span style={{ color: h.outcome === "won" ? PALETTE.good : PALETTE.bad }}>{h.outcome === "won" ? "Kazandı" : "Kaybetti"}</span>
                  </>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </Shell>
  );
}

/* ---------------- APP ---------------- */

function App() {
  const [view, setView] = useState("home");
  const [icHistory, setIcHistory] = useState([]);
  const [icStreak, setIcStreak] = useState(0);
  const [reactionHistory, setReactionHistory] = useState([]);
  const [memoryHistory, setMemoryHistory] = useState([]);
  const [countHistory, setCountHistory] = useState([]);
  const [stroopHistory, setStroopHistory] = useState([]);
  const [sudokuHistory, setSudokuHistory] = useState([]);
  const [game2048History, setGame2048History] = useState([]);
  const [minesweeperHistory, setMinesweeperHistory] = useState([]);

  return (
    <>
      {view === "home" && <Home onSelect={setView} />}
      {view === "cat-mindsports" && (
        <MindSportsList
          onBack={() => setView("home")}
          onSelectGame={setView}
          icHistory={icHistory} reactionHistory={reactionHistory}
          memoryHistory={memoryHistory} countHistory={countHistory} stroopHistory={stroopHistory}
        />
      )}
      {view === "cat-puzzles" && (
        <PuzzlesList
          onBack={() => setView("home")}
          onSelectGame={setView}
          sudokuHistory={sudokuHistory}
          game2048History={game2048History}
          minesweeperHistory={minesweeperHistory}
        />
      )}
      {view === "innerclock" && (
        <InnerclockGame
          onBack={() => setView("cat-mindsports")}
          onReport={() => setView("report-innerclock")}
          history={icHistory} setHistory={setIcHistory}
          streak={icStreak} setStreak={setIcStreak}
        />
      )}
      {view === "reaction" && (
        <ReactionGame
          onBack={() => setView("cat-mindsports")}
          onReport={() => setView("report-reaction")}
          history={reactionHistory} setHistory={setReactionHistory}
        />
      )}
      {view === "memory" && (
        <MemoryGame
          onBack={() => setView("cat-mindsports")}
          onReport={() => setView("report-memory")}
          history={memoryHistory} setHistory={setMemoryHistory}
        />
      )}
      {view === "count" && (
        <CountGame
          onBack={() => setView("cat-mindsports")}
          onReport={() => setView("report-count")}
          history={countHistory} setHistory={setCountHistory}
        />
      )}
      {view === "stroop" && (
        <StroopGame
          onBack={() => setView("cat-mindsports")}
          onReport={() => setView("report-stroop")}
          history={stroopHistory} setHistory={setStroopHistory}
        />
      )}
      {view === "sudoku" && (
        <SudokuGame
          onBack={() => setView("cat-puzzles")}
          onReport={() => setView("report-sudoku")}
          history={sudokuHistory} setHistory={setSudokuHistory}
        />
      )}
      {view === "2048" && (
        <Game2048
          onBack={() => setView("cat-puzzles")}
          onReport={() => setView("report-2048")}
          history={game2048History} setHistory={setGame2048History}
        />
      )}
      {view === "minesweeper" && (
        <MinesweeperGame
          onBack={() => setView("cat-puzzles")}
          onReport={() => setView("report-minesweeper")}
          history={minesweeperHistory} setHistory={setMinesweeperHistory}
        />
      )}
      {view === "feedback" && <FeedbackForm onBack={() => setView("home")} />}
      {view === "report-innerclock" && <Report type="innerclock" history={icHistory} onBack={() => setView("innerclock")} />}
      {view === "report-reaction" && <Report type="reaction" history={reactionHistory} onBack={() => setView("reaction")} />}
      {view === "report-memory" && <Report type="memory" history={memoryHistory} onBack={() => setView("memory")} />}
      {view === "report-count" && <Report type="count" history={countHistory} onBack={() => setView("count")} />}
      {view === "report-stroop" && <Report type="stroop" history={stroopHistory} onBack={() => setView("stroop")} />}
      {view === "report-sudoku" && <Report type="sudoku" history={sudokuHistory} onBack={() => setView("sudoku")} />}
      {view === "report-2048" && <Report type="2048" history={game2048History} onBack={() => setView("2048")} />}
      {view === "report-minesweeper" && <Report type="minesweeper" history={minesweeperHistory} onBack={() => setView("minesweeper")} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
